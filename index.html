<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ZIP Auto Loader</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { margin:0; font-family: Arial; background:#111; color:#fff; }
    iframe { width:100%; height:100vh; border:none; }
    #topbar { padding:10px; background:#222; }
  </style>
</head>
<body>

<div id="topbar">
  Carregando automaticamente: <b>w96.zip</b>
</div>

<iframe id="viewer"></iframe>

<script>
const viewer = document.getElementById('viewer');

async function loadZip() {
  try {
    const res = await fetch('./w96.zip');
    const blob = await res.blob();

    const zip = await JSZip.loadAsync(blob);

    let indexFile = null;

    zip.forEach((path, file) => {
      if (path.toLowerCase().endsWith('index.html')) {
        indexFile = file;
      }
    });

    if (!indexFile) {
      document.body.innerHTML += '<p>index.html não encontrado no ZIP</p>';
      return;
    }

    const content = await indexFile.async('text');
    viewer.srcdoc = content;

  } catch (err) {
    document.body.innerHTML += '<p>Erro ao carregar w96.zip</p>';
    console.error(err);
  }
}

loadZip();
</script>

</body>
</html>
